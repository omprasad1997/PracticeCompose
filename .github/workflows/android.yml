name: Android Matrix Build

on:
  push:
    branches: [ "different_flavors" ]

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        flavor: [dev, staging, production]

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Grant permission
        run: chmod +x gradlew

      - name: Build Flavor
        run: ./gradlew assemble${{ matrix.flavor }}Debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.flavor }}
          path: app/build/outputs/apk/${{ matrix.flavor }}/debug/